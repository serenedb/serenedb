name: task | coverage

on:
  workflow_dispatch:
    inputs:
      LOCATION:
        description: "Runner label"
        type: string
        required: false
        default: "linux-amd64"
      PR_SHA:
        description: "Commit SHA to checkout (empty = workflow ref)"
        type: string
        required: false
        default: ""
  workflow_call:
    inputs:
      LOCATION:
        description: "Runner label"
        type: string
        required: false
        default: "linux-amd64"
      PR_SHA:
        description: "Commit SHA to checkout (fork PR support; empty = workflow ref)"
        type: string
        required: false
        default: ""

jobs:
  coverage:
    uses: ./.github/workflows/build-reusable.yml
    with:
      LOCATION: ${{ inputs.LOCATION }}
      KIND: both
      DEV: true
      INSTRUMENTATION: coverage
      PR_SHA: ${{ inputs.PR_SHA }}
    secrets: inherit
