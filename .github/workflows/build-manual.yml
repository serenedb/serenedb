name: serenedb | build & test

run-name: "serenedb | build & test [${{ inputs.LOCATION }}]"

on:
  workflow_dispatch:
    inputs:
      LOCATION:
        description: 'Runner label (linux = any of our machines; all = amd64 + arm64 explicitly)'
        type: choice
        required: true
        default: 'linux'
        options:
          - linux
          - linux-amd64
          - linux-arm64
          - all
      EVERYTHING:
        description: 'Scope: run everything regardless of diff'
        type: boolean
        default: false
      EXTRA_ASAN:
        description: 'Run the full in-scope suite set under ASAN (not just ours + drivers)'
        type: boolean
        default: false
      EXTRA_TSAN:
        description: 'Run the full in-scope suite set under TSAN (not just ours + drivers)'
        type: boolean
        default: false
      PR_SHA:
        description: 'Exact commit SHA to build (fork PR support; empty = ref)'
        type: string
        required: false
        default: ''
      PR_NUMBER:
        description: 'Internal: PR number; scopes concurrency so fork PRs (which dispatch on the base ref) do not cancel each other'
        type: string
        required: false
        default: ''
      BUILD_CONFIG:
        description: 'Internal: PR metadata (set by trigger bot)'
        type: string
        required: false
        default: '{}'

permissions:
  statuses: write
  contents: read

concurrency:
  group: build-manual-${{ inputs.PR_NUMBER && format('pr-{0}', inputs.PR_NUMBER) || github.run_id }}
  cancel-in-progress: true

jobs:
  classify:
    name: classify changes
    if: ${{ !inputs.EVERYTHING }}
    runs-on: ubuntu-latest
    outputs:
      iresearch: ${{ steps.classify.outputs.iresearch }}
      extension: ${{ steps.classify.outputs.extension }}
      duckdb: ${{ steps.classify.outputs.duckdb }}
      pg: ${{ steps.classify.outputs.pg }}
      pg_tests: ${{ steps.classify.outputs.pg_tests }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.PR_SHA || github.sha }}
          fetch-depth: 0
      - id: classify
        run: ./scripts/ci/classify-changes.sh origin/main

  perf:
    name: perf (${{ matrix.location }})
    needs: classify
    if: ${{ !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        location: ${{ fromJSON(inputs.LOCATION == 'all' && '["linux-amd64","linux-arm64"]' || format('["{0}"]', inputs.LOCATION)) }}
    uses: ./.github/workflows/build-reusable.yml
    with:
      LOCATION: ${{ matrix.location }}
      CONFIG: perf
      SQLITE: ${{ inputs.EVERYTHING || needs.classify.outputs.duckdb == 'true' }}
      SQLSMITH: ${{ inputs.EVERYTHING || needs.classify.outputs.duckdb == 'true' }}
      PR_SHA: ${{ inputs.PR_SHA }}
    secrets: inherit

  dev:
    name: dev (${{ matrix.location }})
    needs: classify
    if: ${{ !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        location: ${{ fromJSON(inputs.LOCATION == 'all' && '["linux-amd64","linux-arm64"]' || format('["{0}"]', inputs.LOCATION)) }}
    uses: ./.github/workflows/build-reusable.yml
    with:
      LOCATION: ${{ matrix.location }}
      CONFIG: dev
      IRESEARCH: ${{ inputs.EVERYTHING || needs.classify.outputs.iresearch == 'true' }}
      EXTENSION: ${{ inputs.EVERYTHING || needs.classify.outputs.extension == 'true' }}
      SQLITE: ${{ inputs.EVERYTHING || needs.classify.outputs.duckdb == 'true' }}
      SQLSMITH: ${{ inputs.EVERYTHING || needs.classify.outputs.duckdb == 'true' }}
      PR_SHA: ${{ inputs.PR_SHA }}
    secrets: inherit

  asan:
    name: asan (${{ matrix.location }})
    needs: classify
    if: ${{ !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        location: ${{ fromJSON(inputs.LOCATION == 'all' && '["linux-amd64","linux-arm64"]' || format('["{0}"]', inputs.LOCATION)) }}
    uses: ./.github/workflows/build-reusable.yml
    with:
      LOCATION: ${{ matrix.location }}
      CONFIG: asan
      RUN_EXTRA: ${{ inputs.EVERYTHING || inputs.EXTRA_ASAN }}
      IRESEARCH: ${{ inputs.EVERYTHING || needs.classify.outputs.iresearch == 'true' }}
      EXTENSION: ${{ inputs.EVERYTHING || needs.classify.outputs.extension == 'true' }}
      SQLITE: ${{ inputs.EVERYTHING || needs.classify.outputs.duckdb == 'true' }}
      SQLSMITH: ${{ inputs.EVERYTHING || needs.classify.outputs.duckdb == 'true' }}
      PR_SHA: ${{ inputs.PR_SHA }}
    secrets: inherit

  tsan:
    name: tsan (${{ matrix.location }})
    needs: classify
    if: ${{ !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        location: ${{ fromJSON(inputs.LOCATION == 'all' && '["linux-amd64","linux-arm64"]' || format('["{0}"]', inputs.LOCATION)) }}
    uses: ./.github/workflows/build-reusable.yml
    with:
      LOCATION: ${{ matrix.location }}
      CONFIG: tsan
      RUN_EXTRA: ${{ inputs.EVERYTHING || inputs.EXTRA_TSAN }}
      IRESEARCH: ${{ inputs.EVERYTHING || needs.classify.outputs.iresearch == 'true' }}
      EXTENSION: ${{ inputs.EVERYTHING || needs.classify.outputs.extension == 'true' }}
      SQLITE: ${{ inputs.EVERYTHING || needs.classify.outputs.duckdb == 'true' }}
      SQLSMITH: ${{ inputs.EVERYTHING || needs.classify.outputs.duckdb == 'true' }}
      PR_SHA: ${{ inputs.PR_SHA }}
    secrets: inherit

  validate-pg:
    name: validate pg
    needs: classify
    if: ${{ !cancelled() && (inputs.EVERYTHING || needs.classify.outputs.pg == 'true') }}
    uses: ./.github/workflows/validate-pg-tests.yml
    with:
      LOCATION: linux
      PR_SHA: ${{ inputs.PR_SHA }}
      # empty = run all pg tests downstream
      PG_TESTS: ${{ inputs.EVERYTHING && '' || needs.classify.outputs.pg_tests }}
    secrets: inherit

  report:
    name: Report Status
    needs: [classify, dev, asan, tsan, perf, validate-pg]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for notify script)
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false
          sparse-checkout: scripts
          sparse-checkout-cone-mode: true
      - name: Send notification
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TG_THREAD_ID_MAIN: "51"
          TG_THREAD_ID_BUILD: "53"
          TG_USER_MAP: ${{ secrets.TG_USER_MAP }}
          BRANCH: ${{ contains(inputs.BUILD_CONFIG, 'PR_BRANCH') && fromJSON(inputs.BUILD_CONFIG).PR_BRANCH || github.ref_name }}
          JOB_STATUS: ${{ (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) && 'failure' || 'success' }}
          ACTOR: ${{ contains(inputs.BUILD_CONFIG, 'TRIGGERED_BY') && fromJSON(inputs.BUILD_CONFIG).TRIGGERED_BY || github.actor }}
          RUN_NAME: "serenedb | build & test [${{ inputs.LOCATION }}]"
          RUN_NUMBER: ${{ github.run_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: ./scripts/send_notification.bash
      - name: Update PR commit status
        if: contains(inputs.BUILD_CONFIG, 'PR_SHA')
        uses: actions/github-script@v8
        env:
          BUILD_CONFIG: ${{ inputs.BUILD_CONFIG }}
          JOB_STATUS: ${{ (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) && 'failure' || 'success' }}
        with:
          script: |
            const config = JSON.parse(process.env.BUILD_CONFIG);
            const state = process.env.JOB_STATUS === 'success' ? 'success' : 'failure';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: config.PR_SHA,
              state,
              description: state === 'success' ? 'All checks passed' : 'Some checks failed',
              context: config.PR_STATUS_CONTEXT || 'serenedb | build & test',
              target_url: runUrl,
            });
