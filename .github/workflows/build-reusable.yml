name: task | serenedb build & test

on:
  workflow_dispatch:
    inputs:
      LOCATION:
        description: "Runner label"
        type: string
        required: false
        default: "linux"
      CONFIG:
        description: "Build config: dev, perf (optimized, no tests/FI), asan/tsan/msan/ubsan (sanitizer), coverage"
        type: choice
        required: false
        default: "dev"
        options:
          - perf
          - dev
          - asan
          - tsan
          - msan
          - ubsan
          - coverage
      IRESEARCH:
        description: "also build + run iresearch-tests + iresearch-load"
        type: boolean
        required: false
        default: false
      EXTENSION:
        description: "also build + run unittest (duckdb + extensions) tests"
        type: boolean
        required: false
        default: false
      SQLITE:
        description: "also run the sqlite sqllogic subtree"
        type: boolean
        required: false
        default: false
      SQLSMITH:
        description: "also run sqlsmith fuzzing (+ the r driver)"
        type: boolean
        required: false
        default: false
      RUN_EXTRA:
        description: "sanitizer configs only: run the full in-scope set (gtest + iresearch + extension + sqlite + sqlsmith), not just ours + drivers"
        type: boolean
        required: false
        default: false
      PR_SHA:
        description: "Commit SHA to checkout (empty = workflow ref)"
        type: string
        required: false
        default: ""
      FUZZ_QUERIES:
        description: "sqlsmith --max-queries per instance (empty = runner default)"
        type: string
        required: false
        default: ""
      FUZZ_PARALLEL:
        description: "sqlsmith concurrent instances (empty = runner default)"
        type: string
        required: false
        default: ""
      EXTRA_CMAKE_FLAGS:
        description: "Additional cmake flags (rare overrides)"
        type: string
        required: false
        default: ""
  workflow_call:
    inputs:
      LOCATION:
        description: "Runner label"
        type: string
        required: false
        default: "linux"
      CONFIG:
        description: "Build config: dev, perf (optimized, no tests/FI), asan/tsan/msan/ubsan (sanitizer), coverage"
        type: string
        required: false
        default: "dev"
      IRESEARCH:
        description: "also build + run iresearch-tests + iresearch-load"
        type: boolean
        required: false
        default: false
      EXTENSION:
        description: "also build + run unittest (duckdb + extensions) tests"
        type: boolean
        required: false
        default: false
      SQLITE:
        description: "also run the sqlite sqllogic subtree"
        type: boolean
        required: false
        default: false
      SQLSMITH:
        description: "also run sqlsmith fuzzing (+ the r driver)"
        type: boolean
        required: false
        default: false
      RUN_EXTRA:
        description: "sanitizer configs only: run the full in-scope set, not just ours + drivers"
        type: boolean
        required: false
        default: false
      PR_SHA:
        description: "Commit SHA to checkout (fork PR support; empty = workflow ref)"
        type: string
        required: false
        default: ""
      FUZZ_QUERIES:
        type: string
        required: false
        default: ""
      FUZZ_PARALLEL:
        type: string
        required: false
        default: ""
      EXTRA_CMAKE_FLAGS:
        description: "Additional cmake flags (rare overrides)"
        type: string
        required: false
        default: ""

env:
  WORKSPACE: ${{ github.workspace }}
  BUILD_IMAGE: serenedb/serenedb-build-ubuntu:latest
  CARGO_TARGET_CACHE: /mnt/data/.cargo-target-sqllogic
  SDB_TIMING_CACHE: /mnt/data/sdb-ci/timing

jobs:
  test:
    name: "${{ inputs.CONFIG }} (${{ inputs.LOCATION }})"
    runs-on:
      - ${{ inputs.LOCATION }}
    permissions:
      contents: read

    steps:
      - name: Derive build flags
        run: |
          # perf is the only optimized build: no asserts, no unit-test binaries,
          # and no fault injection (so no recovery). Every other config builds like
          # dev (asserts + tests + FI); for sanitizers RUN_EXTRA only gates what RUNS.
          if [[ "${{ inputs.CONFIG }}" == "perf" ]]; then
            echo "SDB_DEV=Off"             >> $GITHUB_ENV
            echo "SDB_GTEST=Off"           >> $GITHUB_ENV
            echo "SDB_FAULT_INJECTION=Off" >> $GITHUB_ENV
          else
            echo "SDB_DEV=On"              >> $GITHUB_ENV
            echo "SDB_GTEST=On"            >> $GITHUB_ENV
            echo "SDB_FAULT_INJECTION=On"  >> $GITHUB_ENV
          fi

          case "${{ inputs.CONFIG }}" in
            dev|perf) echo "SANITIZERS="                  >> $GITHUB_ENV; echo "USE_COVERAGE="            >> $GITHUB_ENV ;;
            asan)     echo "SANITIZERS=Address"           >> $GITHUB_ENV; echo "USE_COVERAGE="            >> $GITHUB_ENV ;;
            tsan)     echo "SANITIZERS=Thread"            >> $GITHUB_ENV; echo "USE_COVERAGE="            >> $GITHUB_ENV ;;
            msan)     echo "SANITIZERS=MemoryWithOrigins" >> $GITHUB_ENV; echo "USE_COVERAGE="            >> $GITHUB_ENV ;;
            ubsan)    echo "SANITIZERS=Undefined"         >> $GITHUB_ENV; echo "USE_COVERAGE="            >> $GITHUB_ENV ;;
            coverage) echo "SANITIZERS="                  >> $GITHUB_ENV; echo "USE_COVERAGE=SourceBased" >> $GITHUB_ENV ;;
            *) echo "Unknown CONFIG '${{ inputs.CONFIG }}'" >&2; exit 1 ;;
          esac

          echo "RUN_IRESEARCH=${{ inputs.IRESEARCH }}" >> $GITHUB_ENV
          echo "RUN_EXTENSION=${{ inputs.EXTENSION }}" >> $GITHUB_ENV
          echo "RUN_SQLITE=${{ inputs.SQLITE }}"       >> $GITHUB_ENV
          echo "RUN_SQLSMITH=${{ inputs.SQLSMITH }}"   >> $GITHUB_ENV
          echo "RUN_EXTRA=${{ inputs.RUN_EXTRA }}"     >> $GITHUB_ENV

          echo "BUILDMODE=RelWithDebInfo" >> $GITHUB_ENV
          echo "USE_DEBUG_INFO=COLUMNS"   >> $GITHUB_ENV
          echo "USE_IPO=Off"              >> $GITHUB_ENV
          echo "SDB_ALLOC=JE"             >> $GITHUB_ENV
          echo "ENSURE_VTUNE_SYMBOLS=Off" >> $GITHUB_ENV
          echo "DEB_TAR_PACKAGES=false"   >> $GITHUB_ENV
          echo "STRIP_TARBALL=false"      >> $GITHUB_ENV
          echo "DEBUG_SYMBOLS=false"      >> $GITHUB_ENV
          git config --global --add safe.directory '*'

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.PR_SHA || github.sha }}
          fetch-depth: 1
          submodules: true
          clean: true

      - name: Set sanitizer options
        if: env.SANITIZERS != '' || env.USE_COVERAGE != ''
        run: ./scripts/ci/steps/01-ci-set-sanitizer-options.bash

      - name: Build Docker environment file
        env:
          SDB_FUZZ_QUERIES: ${{ inputs.FUZZ_QUERIES }}
          SDB_FUZZ_PARALLEL: ${{ inputs.FUZZ_PARALLEL }}
        run: ./scripts/ci/steps/02-ci-build-docker-env-file.bash

      # One-time per CI machine:
      #   sudo install -d -m 2777 /mnt/data/sdb-ci /mnt/data/.ccache /mnt/data/.cargo-target-sqllogic /mnt/data/cores /mnt/data/searchbench
      #   sudo snap install aws-cli --classic
      #   echo 'kernel.core_pattern=/mnt/data/cores/%e.%p.%t' | sudo tee /etc/sysctl.d/99-serenedb-ci.conf
      #   echo 'kernel.randomize_va_space=0' | sudo tee -a /etc/sysctl.d/99-serenedb-ci.conf
      #   echo 'kernel.yama.ptrace_scope=0' | sudo tee -a /etc/sysctl.d/99-serenedb-ci.conf
      #   sudo sysctl --system
      - name: Prepare caches
        run: |
          SDB_TIMING_KEY="$(./scripts/ci/cache-key.sh)"
          echo "SDB_TIMING_KEY=$SDB_TIMING_KEY" >> $GITHUB_ENV
          install -d -m 2777 /mnt/data/sdb-ci/timing
          install -d -m 2777 "/mnt/data/sdb-ci/gtest-parallel/$SDB_TIMING_KEY"
          echo "GTEST_PARALLEL_CACHE_DIR=/mnt/data/sdb-ci/gtest-parallel/$SDB_TIMING_KEY" >> $GITHUB_ENV
          # out/ maps into /serenedb/out inside the containers; pre-create so producers can write there.
          mkdir -p "${WORKSPACE}"/out/{logs,test-results,coverage/profiles} \
                   "${WORKSPACE}"/out/sanitizers/{leak,undefined,address,memory,thread}

      - name: Build
        id: build
        run: |
          DOCKER_USER="$(id -u):$(id -g)"
          EXTRA_FLAGS="${{ inputs.EXTRA_CMAKE_FLAGS }}"

          # perf builds the server only (no asserts/FI/tests). Every other config
          # also builds the unit-test binaries; iresearch/unittest are added only
          # when their suite is in scope so a core-only diff doesn't build them.
          TARGETS=(iresearch-examples serened tzdata)
          if [[ "${{ inputs.CONFIG }}" != "perf" ]]; then
            TARGETS+=(serenedb-tests_basics serenedb-tests_connector)
            [[ "$RUN_IRESEARCH" == "true" ]] && TARGETS+=(iresearch-tests iresearch-load-tests)
            if [[ "$RUN_EXTENSION" == "true" ]]; then
              TARGETS+=(unittest)
              EXTRA_FLAGS="${EXTRA_FLAGS} -DSDB_BUILD_DUCKDB_UNITTESTS=ON"
            fi
          fi

          docker run --rm \
            --user "$DOCKER_USER" \
            -e HOME=/serenedb \
            -e CCACHE_DIR=/.ccache \
            --cap-add=SYS_PTRACE \
            --security-opt seccomp=unconfined \
            --env-file ./docker.env \
            -e BUILD_DIR=build \
            -e SDB_GTEST="$SDB_GTEST" \
            -e BUILDMODE="$BUILDMODE" \
            -e USE_DEBUG_INFO="$USE_DEBUG_INFO" \
            -e SDB_DEV="$SDB_DEV" \
            -e SDB_FAULT_INJECTION="$SDB_FAULT_INJECTION" \
            -e USE_IPO="$USE_IPO" \
            -e USE_COVERAGE="$USE_COVERAGE" \
            -e ENSURE_VTUNE_SYMBOLS="$ENSURE_VTUNE_SYMBOLS" \
            ${EXTRA_FLAGS:+-e EXTRA_CMAKE_FLAGS="$EXTRA_FLAGS"} \
            -v "${WORKSPACE}:/serenedb" \
            -v /mnt/data/.ccache:/.ccache \
            "${BUILD_IMAGE}" /serenedb/scripts/ci/build.bash "${TARGETS[@]}"

      - name: Run suites
        if: steps.build.outcome == 'success'
        env:
          SDB_FUZZ_QUERIES: ${{ inputs.FUZZ_QUERIES }}
          SDB_FUZZ_PARALLEL: ${{ inputs.FUZZ_PARALLEL }}
          # iresearch-load corpus comes from S3; a failed/missing fetch fails the job.
          SEARCHBENCH_S3_KEY_ID: ${{ secrets.SEARCHBENCH_S3_KEY_ID }}
          SEARCHBENCH_S3_SECRET: ${{ secrets.SEARCHBENCH_S3_SECRET }}
        run: BUILD_DIR=build CONFIG="${{ inputs.CONFIG }}" ./scripts/ci/steps/run-suites.sh

      - name: Generate coverage report
        if: steps.build.outcome == 'success' && env.USE_COVERAGE != ''
        run: BUILD_DIR=build ./scripts/ci/steps/06-ci-in-docker-generate-coverage-report.bash

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-artifacts-${{ inputs.CONFIG }}-${{ inputs.LOCATION }}-${{ github.run_number }}
          path: out/
          if-no-files-found: ignore
          retention-days: 30
