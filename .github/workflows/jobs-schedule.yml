name: auto | nightly

on:
  schedule:
    - cron: '0 5 * * *'
    - cron: '0 1 * * 1'
    - cron: '0 1 * * 2'
    - cron: '0 1 * * 3'
    - cron: '0 1 * * 4'

jobs:
  coverage:
    if: github.event.schedule == '0 5 * * *'
    uses: ./.github/workflows/build-reusable.yml
    with:
      LOCATION: linux-amd64
      CONFIG: coverage
      IRESEARCH: true
      EXTENSION: true
      SQLITE: true
      SQLSMITH: true
      FUZZ_QUERIES: "10000"
      FUZZ_PARALLEL: "4"
    secrets: inherit

  everything:
    if: github.event.schedule == '0 5 * * *'
    uses: ./.github/workflows/build-reusable.yml
    with:
      LOCATION: linux-amd64
      CONFIG: dev
      IRESEARCH: true
      EXTENSION: true
      SQLITE: true
      SQLSMITH: true
    secrets: inherit

  release-check:
    if: github.event.schedule == '0 5 * * *'
    uses: ./.github/workflows/make-package.yml
    with:
      LOCATION: linux-amd64
      RTA: required
      UPLOAD_ARTIFACTS: false

  sanitizer:
    if: github.event.schedule != '0 5 * * *'
    uses: ./.github/workflows/build-reusable.yml
    with:
      LOCATION: linux-amd64
      CONFIG: >-
        ${{ github.event.schedule == '0 1 * * 1' && 'msan'
         || github.event.schedule == '0 1 * * 2' && 'asan'
         || github.event.schedule == '0 1 * * 3' && 'ubsan'
         || 'tsan' }}
      # RUN_EXTRA: nightly sanitizers run the full in-scope set, not just ours + drivers.
      RUN_EXTRA: true
      IRESEARCH: true
      EXTENSION: true
      SQLITE: true
      SQLSMITH: true
      FUZZ_QUERIES: "10000"
      FUZZ_PARALLEL: "4"
    secrets: inherit

  notify:
    needs: [coverage, everything, release-check, sanitizer]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false
          sparse-checkout: scripts
          sparse-checkout-cone-mode: true
      - name: Send notification
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TG_THREAD_ID_MAIN: "51"
          TG_THREAD_ID_BUILD: "53"
          TG_USER_MAP: ${{ secrets.TG_USER_MAP }}
          BRANCH: main
          JOB_STATUS: ${{ (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) && 'failure' || 'success' }}
          ACTOR: scheduled
          RUN_NAME: "auto | nightly"
          RUN_NUMBER: ${{ github.run_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: ./scripts/send_notification.bash
