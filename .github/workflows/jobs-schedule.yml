name: auto | nightly

on:
  schedule:
    # Daily at 05:00 UTC - coverage + release check
    - cron: '0 5 * * *'
    # Monday 01:00 UTC - Memory sanitizer
    - cron: '0 1 * * 1'
    # Tuesday 01:00 UTC - Address sanitizer
    - cron: '0 1 * * 2'
    # Wednesday 01:00 UTC - Undefined behavior sanitizer
    - cron: '0 1 * * 3'
    # Thursday 01:00 UTC - Thread sanitizer
    - cron: '0 1 * * 4'

jobs:
  # ==================== DAILY: COVERAGE ====================
  coverage:
    if: github.event.schedule == '0 5 * * *'
    uses: ./.github/workflows/build-reusable.yml
    with:
      LOCATION: linux-amd64
      KIND: both
      DEV: true
      INSTRUMENTATION: coverage
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}

  # ==================== DAILY: RELEASE COMPILE + RTA ====================
  release-check:
    if: github.event.schedule == '0 5 * * *'
    uses: ./.github/workflows/make-package.yml
    with:
      LOCATION: linux-amd64
      RUN_RTA: true
      UPLOAD_ARTIFACTS: false
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}

  # ==================== MONDAY: MEMORY SANITIZER ====================
  msan-unit:
    if: github.event.schedule == '0 1 * * 1'
    uses: ./.github/workflows/build-reusable.yml
    with:
      LOCATION: linux-amd64
      KIND: unit
      DEV: true
      INSTRUMENTATION: msan
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}

  msan-functional:
    if: github.event.schedule == '0 1 * * 1'
    uses: ./.github/workflows/build-reusable.yml
    with:
      LOCATION: linux-amd64
      KIND: functional
      DEV: true
      INSTRUMENTATION: msan
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}

  # ==================== TUESDAY: ADDRESS SANITIZER ====================
  asan-unit:
    if: github.event.schedule == '0 1 * * 2'
    uses: ./.github/workflows/build-reusable.yml
    with:
      LOCATION: linux-amd64
      KIND: unit
      DEV: true
      INSTRUMENTATION: asan
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}

  asan-functional:
    if: github.event.schedule == '0 1 * * 2'
    uses: ./.github/workflows/build-reusable.yml
    with:
      LOCATION: linux-amd64
      KIND: functional
      DEV: true
      INSTRUMENTATION: asan
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}

  # ==================== WEDNESDAY: UNDEFINED BEHAVIOR SANITIZER ====================
  ubsan-unit:
    if: github.event.schedule == '0 1 * * 3'
    uses: ./.github/workflows/build-reusable.yml
    with:
      LOCATION: linux-amd64
      KIND: unit
      DEV: true
      INSTRUMENTATION: ubsan
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}

  ubsan-functional:
    if: github.event.schedule == '0 1 * * 3'
    uses: ./.github/workflows/build-reusable.yml
    with:
      LOCATION: linux-amd64
      KIND: functional
      DEV: true
      INSTRUMENTATION: ubsan
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}

  # ==================== THURSDAY: THREAD SANITIZER ====================
  tsan-unit:
    if: github.event.schedule == '0 1 * * 4'
    uses: ./.github/workflows/build-reusable.yml
    with:
      LOCATION: linux-amd64
      KIND: unit
      DEV: true
      INSTRUMENTATION: tsan
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}

  tsan-functional:
    if: github.event.schedule == '0 1 * * 4'
    uses: ./.github/workflows/build-reusable.yml
    with:
      LOCATION: linux-amd64
      KIND: functional
      DEV: true
      INSTRUMENTATION: tsan
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}

  # ==================== NOTIFICATION ====================
  notify:
    needs: [coverage, release-check, msan-unit, msan-functional, asan-unit, asan-functional, ubsan-unit, ubsan-functional, tsan-unit, tsan-functional]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          sparse-checkout: scripts
          sparse-checkout-cone-mode: true

      - name: Send Telegram notification
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TG_THREAD_ID_MAIN: "51"
          TG_THREAD_ID_BUILD: "53"
          TG_USER_MAP: ${{ secrets.TG_USER_MAP }}
          BRANCH: main
          JOB_STATUS: ${{ contains(needs.*.result, 'failure') && 'failure' || 'success' }}
          ACTOR: scheduled
          RUN_NAME: "auto | nightly"
          RUN_NUMBER: ${{ github.run_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: ./scripts/notify_telegram.bash
