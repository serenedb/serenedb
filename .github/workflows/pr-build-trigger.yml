name: PR-Build-Trigger

on:
  pull_request:
    types: [opened]
  issue_comment:
    types: [edited]

jobs:
  post-checkboxes:
    # Post build trigger checkboxes as a bot comment when PR is opened
    if: github.event_name == 'pull_request' && github.event.action == 'opened'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post build triggers comment
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '### Build Triggers',
              '_Check to trigger a build on `self-hosted`. Auto-unchecks after triggering._',
              '',
              '- [ ] build',
              '- [ ] asan',
              '- [ ] tsan',
              '- [ ] release',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: body,
            });

  trigger-build:
    # React to checkbox edits in a bot comment on a PR
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.action == 'edited' &&
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '### Build Triggers') &&
      contains(github.event.comment.body, '- [x]')
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      pull-requests: write
      statuses: write
    steps:
      - name: Parse checkboxes and trigger builds
        uses: actions/github-script@v7
        with:
          script: |
            const comment = context.payload.comment;
            const body = comment.body || '';
            const prNumber = context.payload.issue.number;

            // Get PR details for branch and SHA
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            const branch = pr.head.ref;
            const sha = pr.head.sha;

            // Match checked boxes like "- [x] build"
            const checkedPattern = /- \[x\] (\w+)/g;
            const validPresets = ['asan', 'tsan', 'build', 'release'];
            const presets = [];
            let match;
            while ((match = checkedPattern.exec(body)) !== null) {
              if (validPresets.includes(match[1])) {
                presets.push(match[1]);
              }
            }

            if (presets.length === 0) {
              core.info('No build triggers found');
              return;
            }

            const location = 'self-hosted';
            const triggered = [];

            for (const preset of presets) {
              const statusContext = `SereneDB-Build / ${preset}`;
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha: sha,
                state: 'pending',
                description: `Build ${preset} triggered...`,
                context: statusContext,
              });

              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'build-manual.yml',
                ref: branch,
                inputs: {
                  PRESET: preset,
                  LOCATION: location,
                  BRANCH: branch,
                  JOB_CONFIG: '{"CLUSTER_BRANCH":"main","BUILD_IMAGE":"registry.serenedb.com:5000/serenedb-build-ubuntu:latest","SDB_CLUSTER":"Off","DEBUG_PRINT_ENV":"false"}',
                  DOCKER_SERENEDB_IMAGE: 'false',
                  DOCKER_EXTRA_TAGS: '',
                  PUSH_IMAGES_2_REGISTRY: 'false',
                  EXTRA_ARTIFACTS: '',
                  DOCKER_BUILD_IMAGES: 'false',
                  BUILD_CONFIG: '{}',
                },
              });

              // Wait briefly then find the dispatched run to link it
              await new Promise(r => setTimeout(r, 3000));
              const runs = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'build-manual.yml',
                branch: branch,
                per_page: 1,
              });

              const runUrl = runs.data.workflow_runs[0]?.html_url || '';
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha: sha,
                state: 'pending',
                description: `Build ${preset} in progress`,
                context: statusContext,
                target_url: runUrl,
              });

              triggered.push({ preset, runUrl });
              core.info(`Triggered: ${preset} -> ${runUrl}`);
            }

            // Uncheck the boxes so they can be clicked again
            let newBody = body;
            for (const t of triggered) {
              newBody = newBody.replace(`- [x] ${t.preset}`, `- [ ] ${t.preset}`);
            }

            if (newBody !== body) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: comment.id,
                body: newBody,
              });
            }

            // Post confirmation reply
            if (triggered.length > 0) {
              const rows = triggered.map(t => {
                const link = t.runUrl ? `[View run](${t.runUrl})` : 'dispatched';
                return `| \`${t.preset}\` | \`${branch}\` | ${link} |`;
              }).join('\n');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `**Build triggered!**\n\n| Preset | Branch | Link |\n|--------|--------|------|\n${rows}`,
              });
            }
