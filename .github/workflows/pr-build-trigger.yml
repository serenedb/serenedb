name: PR-Build-Trigger

on:
  pull_request:
    types: [opened]
  issue_comment:
    types: [edited]

jobs:
  post-checkboxes:
    # Post build trigger form as a bot comment when PR is opened
    if: github.event_name == 'pull_request' && github.event.action == 'opened'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout: .github/workflows/build-manual.yml
          sparse-checkout-cone-mode: false

      - name: Post build triggers comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const yaml = require('js-yaml');
            const workflow = yaml.load(fs.readFileSync('.github/workflows/build-manual.yml', 'utf8'));
            const inputs = workflow.on.workflow_dispatch.inputs;

            // Build checkbox sections for PRESET and LOCATION
            const sections = ['PRESET', 'LOCATION'].map(key => {
              const input = inputs[key];
              const options = input.options || [];
              const def = input.default || '';
              const checkboxes = options.map(opt =>
                `- [${opt === def ? 'x' : ' '}] ${opt}`
              ).join('\n');
              return `**${key}**\n${checkboxes}`;
            });

            const body = [
              '### Build Triggers',
              '',
              ...sections,
              '',
              '---',
              '- [ ] **Run Build**',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: body,
            });

  trigger-build:
    # React to "Run Build" checkbox in a bot comment on a PR
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.action == 'edited' &&
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '### Build Triggers') &&
      contains(github.event.comment.body, '- [x] **Run Build**')
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      pull-requests: write
      statuses: write
    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout: .github/workflows/build-manual.yml
          sparse-checkout-cone-mode: false

      - name: Parse form and trigger build
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const yaml = require('js-yaml');
            const workflow = yaml.load(fs.readFileSync('.github/workflows/build-manual.yml', 'utf8'));
            const inputs = workflow.on.workflow_dispatch.inputs;

            const comment = context.payload.comment;
            const body = comment.body || '';
            const prNumber = context.payload.issue.number;

            // Get PR details
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            const branch = pr.head.ref;
            const sha = pr.head.sha;

            // Parse selected value for a section (first checked box between section header and next header/---)
            function parseSelection(sectionName) {
              const re = new RegExp(`\\*\\*${sectionName}\\*\\*([\\s\\S]*?)(?=\\*\\*|---|$)`);
              const section = body.match(re)?.[1] || '';
              const checked = section.match(/- \[x\] ([\w-]+)/);
              return checked?.[1] || null;
            }

            const preset = parseSelection('PRESET');
            const location = parseSelection('LOCATION');

            const validPresets = inputs.PRESET.options;
            const validLocations = inputs.LOCATION.options;

            if (!preset || !validPresets.includes(preset)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `**Error:** No valid preset selected. Pick one of: ${validPresets.join(', ')}`,
              });
              return;
            }

            if (!location || !validLocations.includes(location)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `**Error:** No valid location selected. Pick one of: ${validLocations.join(', ')}`,
              });
              return;
            }

            // Build dispatch inputs — use defaults for all non-selected fields
            const dispatchInputs = {};
            for (const [key, cfg] of Object.entries(inputs)) {
              if (key === 'PRESET') dispatchInputs[key] = preset;
              else if (key === 'LOCATION') dispatchInputs[key] = location;
              else if (key === 'BRANCH') dispatchInputs[key] = branch;
              else if (key === 'BUILD_CONFIG') dispatchInputs[key] = JSON.stringify({ TRIGGERED_BY: context.actor, PR_SHA: sha, PR_STATUS_CONTEXT: `SereneDB-Build / ${preset} (${location})` });
              else dispatchInputs[key] = String(cfg.default ?? '');
            }

            // Set pending commit status
            const statusContext = `SereneDB-Build / ${preset} (${location})`;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: sha,
              state: 'pending',
              description: `Build ${preset} on ${location} triggered...`,
              context: statusContext,
            });

            // Dispatch the build
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-manual.yml',
              ref: branch,
              inputs: dispatchInputs,
            });

            // Wait briefly then find the dispatched run to link it
            await new Promise(r => setTimeout(r, 3000));
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-manual.yml',
              branch: branch,
              per_page: 1,
            });

            const runUrl = runs.data.workflow_runs[0]?.html_url || '';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: sha,
              state: 'pending',
              description: `Build ${preset} on ${location} in progress`,
              context: statusContext,
              target_url: runUrl,
            });

            // Uncheck "Run Build" so it can be clicked again
            const newBody = body.replace('- [x] **Run Build**', '- [ ] **Run Build**');
            if (newBody !== body) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: comment.id,
                body: newBody,
              });
            }

            // Post confirmation reply
            const link = runUrl ? `[View run](${runUrl})` : 'dispatched';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `**Build triggered!**\n\n| Preset | Location | Branch | Link |\n|--------|----------|--------|------|\n| \`${preset}\` | \`${location}\` | \`${branch}\` | ${link} |`,
            });
