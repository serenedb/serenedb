name: auto | pr trigger

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to test against'
        required: true
        type: number
  pull_request_target:
    types: [opened, labeled]
  issue_comment:
    types: [edited]

concurrency:
  group: pr-build-trigger-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  post-checkboxes:
    if: >-
      github.event_name == 'pull_request_target' && (
        github.event.action == 'opened' ||
        (github.event.action == 'labeled' && github.event.label.name == 'spawn-build-bot')
      )
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Post build triggers comment
        uses: actions/github-script@v8
        with:
          script: |
            const body = [
              '<!-- serenedb-ci-trigger -->',
              '### CI Triggers',
              '_Check **Trigger Jobs** to start. Optionally enable extra checks below._',
              '',
              '#### Extra (optional)',
              '- [ ] All architectures (amd64 + arm64)',
              '- [ ] ASAN',
              '- [ ] TSAN',
              '- [ ] MSAN',
              '',
              '---',
              '- [ ] **Trigger Jobs**',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: body,
            });

            if (context.payload.action === 'labeled') {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                name: 'spawn-build-bot',
              }).catch(() => {});
            }

  trigger-build:
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.action == 'edited' &&
      github.event.issue.pull_request &&
      github.event.comment.user.login == 'github-actions[bot]' &&
      contains(github.event.comment.body, '<!-- serenedb-ci-trigger -->') &&
      contains(github.event.comment.body, '- [x] **Trigger Jobs**')
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      pull-requests: write
      checks: write
    steps:
      - name: Get PR info
        id: pr-info
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = context.eventName === 'workflow_dispatch'
              ? parseInt(context.payload.inputs.pr_number)
              : context.payload.issue.number;
            const { owner, repo } = context.repo;
            const [{ data: pr }, { data: mergeRef }] = await Promise.all([
              github.rest.pulls.get({ owner, repo, pull_number: prNumber }),
              // Resolve the merge commit SHA -- this is what GitHub uses as head_sha
              // for workflow runs triggered on refs/pull/<N>/merge.
              github.rest.git.getRef({ owner, repo, ref: `pull/${prNumber}/merge` }),
            ]);
            core.setOutput('ref', `refs/pull/${prNumber}/merge`);
            core.setOutput('head_sha', pr.head.sha);          // for the check run (must point to PR head)
            core.setOutput('merge_sha', mergeRef.object.sha); // for matching workflow runs

      - name: Parse options and trigger build
        env:
          PR_REF: ${{ steps.pr-info.outputs.ref }}
          PR_HEAD_SHA: ${{ steps.pr-info.outputs.head_sha }}
          PR_MERGE_SHA: ${{ steps.pr-info.outputs.merge_sha }}
        uses: actions/github-script@v8
        with:
          script: |
            const comment = context.payload.comment;
            const body = comment.body || '';
            const ref = process.env.PR_REF;
            const headSha = process.env.PR_HEAD_SHA;
            const mergeSha = process.env.PR_MERGE_SHA;

            const isChecked = (label) => body.includes(`- [x] ${label}`);

            const allArch = isChecked('All architectures');
            const enableAsan = isChecked('ASAN');
            const enableTsan = isChecked('TSAN');
            const enableMsan = isChecked('MSAN');

            const { owner, repo } = context.repo;
            const checkName = 'serenedb | build & test';

            const { data: check } = await github.rest.checks.create({
              owner, repo,
              head_sha: headSha,
              name: checkName,
              status: 'in_progress',
              output: { title: 'Build queued', summary: 'Waiting for workflow to start...' },
            });

            // Cancel in-progress/queued runs for this PR (matched by head SHA).
            for (const status of ['in_progress', 'queued']) {
              const { data: existing } = await github.rest.actions.listWorkflowRuns({
                owner, repo, workflow_id: 'build-manual.yml', status, per_page: 10,
              });
              for (const run of existing.workflow_runs.filter(r => r.head_sha === mergeSha)) {
                core.info(`Cancelling run #${run.id} (${run.status})`);
                await github.rest.actions.cancelWorkflowRun({ owner, repo, run_id: run.id }).catch(() => {});
              }
            }

            // Snapshot latest run ID before dispatch
            const { data: before } = await github.rest.actions.listWorkflowRuns({
              owner, repo, workflow_id: 'build-manual.yml', per_page: 1,
            });
            const prevId = before.workflow_runs[0]?.id || 0;

            await github.rest.actions.createWorkflowDispatch({
              owner, repo,
              workflow_id: 'build-manual.yml',
              ref: ref,
              inputs: {
                LOCATION: allArch ? 'all' : 'linux-amd64',
                ENABLE_ASAN: enableAsan.toString(),
                ENABLE_TSAN: enableTsan.toString(),
                ENABLE_MSAN: enableMsan.toString(),
                VALIDATE_PG_TESTS: 'true',
                BUILD_CONFIG: JSON.stringify({
                  TRIGGERED_BY: context.actor,
                  PR_SHA: headSha,
                  CHECK_RUN_ID: check.id,
                }),
              },
            });

            // Wait for the new run to appear (up to 30s)
            let runUrl = `${context.serverUrl}/${owner}/${repo}/actions/workflows/build-manual.yml`;
            for (let i = 0; i < 6; i++) {
              await new Promise(r => setTimeout(r, 5000));
              const { data: after } = await github.rest.actions.listWorkflowRuns({
                owner, repo, workflow_id: 'build-manual.yml', per_page: 3,
              });
              const run = after.workflow_runs.find(r => r.id > prevId && r.head_sha === mergeSha);
              if (run) {
                runUrl = run.html_url;
                break;
              }
            }

            // Update check run with the Actions run URL
            await github.rest.checks.update({
              owner, repo,
              check_run_id: check.id,
              status: 'in_progress',
              details_url: runUrl,
              output: { title: 'Build in progress', summary: `[View Run](${runUrl})` },
            });

            const opts = [
              enableAsan && 'asan',
              enableTsan && 'tsan',
              enableMsan && 'msan',
              allArch && 'all arch',
            ].filter(Boolean);
            const optsStr = opts.length > 0 ? opts.join(', ') : 'default';
            const timestamp = new Date().toISOString().replace('T', ' ').substring(0, 19) + ' UTC';
            const latestEntry = `**Latest:** ${optsStr} | [View Run](${runUrl}) | ${timestamp}`;

            // Update the original comment: uncheck "Trigger Jobs" and update results
            let updatedBody = body.replace('- [x] **Trigger Jobs**', '- [ ] **Trigger Jobs**');

            // Results are stored as JSON in a hidden HTML comment for reliable parsing
            const dataRe = /<!-- ci-data:(.*?) -->/;
            const dataMatch = updatedBody.match(dataRe);
            const history = dataMatch ? JSON.parse(dataMatch[1]) : [];
            history.push({ opts: optsStr, url: runUrl, time: timestamp });

            // Build visible output
            const latest = history[history.length - 1];
            let resultsBlock = `\n\n**Latest:** ${latest.opts} · [View Run](${latest.url}) · ${latest.time}`;

            if (history.length > 1) {
              const oldRuns = history.slice(0, -1).reverse().map(r =>
                `| ${r.opts} | [View Run](${r.url}) | ${r.time} |`
              );
              resultsBlock += [
                '',
                '',
                '<details><summary>Previous runs</summary>',
                '',
                '| Options | Link | Time |',
                '|---------|------|------|',
                ...oldRuns,
                '',
                '</details>',
              ].join('\n');
            }

            // Replace or append results section
            const sectionRe = /\n\n<!-- ci-data:.*? -->[\s\S]*$/;
            const newData = `\n\n<!-- ci-data:${JSON.stringify(history)} -->${resultsBlock}`;
            if (sectionRe.test(updatedBody)) {
              updatedBody = updatedBody.replace(sectionRe, newData);
            } else {
              updatedBody += newData;
            }

            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: comment.id,
              body: updatedBody,
            });
