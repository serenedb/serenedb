name: PR CI Comment

on:
  pull_request:
    types: [opened]

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const repo = context.repo;
            const buildUrl = `https://github.com/${repo.owner}/${repo.repo}/actions/workflows/build-manual.yml`;
            const uiUrl = `https://github.com/${repo.owner}/${repo.repo}/actions/workflows/serene-ui-manual.yml`;

            const body = [
              `## CI Actions`,
              ``,
              `| Action | Preset | Location | Link |`,
              `|--------|--------|----------|------|`,
              `| **Build** | build | self-hosted | [▶ Run](${buildUrl}?ref=${branch}) |`,
              `| **Build (ASAN)** | asan | self-hosted | [▶ Run](${buildUrl}?ref=${branch}) |`,
              `| **Build (TSAN)** | tsan | self-hosted | [▶ Run](${buildUrl}?ref=${branch}) |`,
              `| **Build (Release)** | release | self-hosted | [▶ Run](${buildUrl}?ref=${branch}) |`,
              `| **SereneUI Build** | — | — | [▶ Run](${uiUrl}?ref=${branch}) |`,
              ``,
              `> Click a link, select the preset/location, and hit **Run workflow** with branch \`${branch}\`.`,
            ].join('\n');

            await github.rest.issues.createComment({
              ...repo,
              issue_number: context.issue.number,
              body
            });
