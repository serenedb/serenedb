name: task | searchbench

on:
  workflow_dispatch:
    inputs:
      LOCATION:
        description: "Runner label"
        type: string
        required: false
        default: "linux-amd64"
      DATASET:
        description: "SearchBench dataset name (S3 prefix and cache subdir)"
        type: string
        required: false
        default: "wiki_small"
      GTEST_FILTER:
        description: "gtest filter for SearchBenchTest"
        type: string
        required: false
        default: "SearchBenchTest*"
      DEV:
        description: "Enable assertions (SDB_DEV)"
        type: boolean
        required: false
        default: true
      INSTRUMENTATION:
        description: "Sanitizer or coverage"
        type: choice
        required: false
        default: "none"
        options:
          - none
          - coverage
          - asan
          - msan
          - tsan
          - ubsan
      PR_SHA:
        description: "Commit SHA to checkout (empty = workflow ref)"
        type: string
        required: false
        default: ""
  workflow_call:
    inputs:
      LOCATION:
        type: string
        required: false
        default: "linux-amd64"
      DATASET:
        type: string
        required: false
        default: "wiki_small"
      GTEST_FILTER:
        type: string
        required: false
        default: "SearchBenchTest*"
      DEV:
        type: boolean
        required: false
        default: true
      INSTRUMENTATION:
        type: string
        required: false
        default: "none"
      PR_SHA:
        type: string
        required: false
        default: ""
    secrets:
      SEARCHBENCH_S3_KEY_ID:
        required: false
      SEARCHBENCH_S3_SECRET:
        required: false

env:
  WORKSPACE: ${{ github.workspace }}
  BUILD_IMAGE: serenedb/serenedb-build-ubuntu:latest

jobs:
  test:
    name: "searchbench (${{ inputs.DATASET }}, ${{ inputs.INSTRUMENTATION }})"
    runs-on:
      - ${{ inputs.LOCATION }}
    permissions:
      contents: read

    steps:
      - name: Derive build flags
        run: |
          echo "SDB_GTEST=On" >> $GITHUB_ENV
          echo "SDB_FAULT_INJECTION=Off" >> $GITHUB_ENV
          echo "SDB_DEV=${{ inputs.DEV && 'On' || 'Off' }}" >> $GITHUB_ENV

          case "${{ inputs.INSTRUMENTATION }}" in
            none)     echo "SANITIZERS=" >> $GITHUB_ENV; echo "USE_COVERAGE=" >> $GITHUB_ENV ;;
            asan)     echo "SANITIZERS=Address" >> $GITHUB_ENV; echo "USE_COVERAGE=" >> $GITHUB_ENV ;;
            msan)     echo "SANITIZERS=MemoryWithOrigins" >> $GITHUB_ENV; echo "USE_COVERAGE=" >> $GITHUB_ENV ;;
            tsan)     echo "SANITIZERS=Thread" >> $GITHUB_ENV; echo "USE_COVERAGE=" >> $GITHUB_ENV ;;
            ubsan)    echo "SANITIZERS=Undefined" >> $GITHUB_ENV; echo "USE_COVERAGE=" >> $GITHUB_ENV ;;
            coverage) echo "SANITIZERS=" >> $GITHUB_ENV; echo "USE_COVERAGE=SourceBased" >> $GITHUB_ENV ;;
          esac

          echo "BUILDMODE=RelWithDebInfo" >> $GITHUB_ENV
          echo "USE_DEBUG_INFO=COLUMNS" >> $GITHUB_ENV
          echo "USE_IPO=Off" >> $GITHUB_ENV
          echo "SDB_ALLOC=JE" >> $GITHUB_ENV
          echo "ENSURE_VTUNE_SYMBOLS=Off" >> $GITHUB_ENV
          echo "DEB_TAR_PACKAGES=false" >> $GITHUB_ENV
          echo "STRIP_TARBALL=false" >> $GITHUB_ENV
          echo "DEBUG_SYMBOLS=false" >> $GITHUB_ENV

          git config --global --add safe.directory '*'

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.PR_SHA || github.sha }}
          fetch-depth: 1
          submodules: recursive
          clean: true

      - name: Set sanitizer options
        if: env.SANITIZERS != '' || env.USE_COVERAGE != ''
        run: ./scripts/ci/steps/01-ci-set-sanitizer-options.bash

      - name: Build Docker environment file
        run: ./scripts/ci/steps/02-ci-build-docker-env-file.bash

      - name: Fetch SearchBench corpus
        env:
          SEARCHBENCH_DATASET: ${{ inputs.DATASET }}
          SEARCHBENCH_S3_KEY_ID: ${{ secrets.SEARCHBENCH_S3_KEY_ID }}
          SEARCHBENCH_S3_SECRET: ${{ secrets.SEARCHBENCH_S3_SECRET }}
        run: ./scripts/ci/steps/searchbench-fetch-corpus.bash

      - name: Build iresearch-tests
        id: build
        run: |
          DOCKER_USER="$(id -u):$(id -g)"

          docker run --rm \
            --user "$DOCKER_USER" \
            -e HOME=/serenedb \
            -e CCACHE_DIR=/.ccache \
            --cap-add=SYS_PTRACE \
            --security-opt seccomp=unconfined \
            --env-file ./docker.env \
            -e BUILD_DIR=build \
            -e SDB_GTEST="$SDB_GTEST" \
            -e BUILDMODE="$BUILDMODE" \
            -e USE_DEBUG_INFO="$USE_DEBUG_INFO" \
            -e SDB_DEV="$SDB_DEV" \
            -e SDB_FAULT_INJECTION="$SDB_FAULT_INJECTION" \
            -e USE_IPO="$USE_IPO" \
            -e USE_COVERAGE="$USE_COVERAGE" \
            -e ENSURE_VTUNE_SYMBOLS="$ENSURE_VTUNE_SYMBOLS" \
            -v "${WORKSPACE}:/serenedb" \
            -v /mnt/data/.ccache:/.ccache \
            "${BUILD_IMAGE}" /serenedb/scripts/ci/build.bash iresearch-searchbench-tests

      - name: Run SearchBench test
        if: steps.build.outcome == 'success'
        env:
          SEARCHBENCH_GTEST_FILTER: ${{ inputs.GTEST_FILTER }}
        run: BUILD_DIR=build ./scripts/ci/steps/046-ci-in-docker-run-searchbench-test.bash

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: searchbench-${{ inputs.DATASET }}-${{ inputs.INSTRUMENTATION }}-${{ inputs.LOCATION }}-${{ github.run_number }}
          path: |
            cmake_*.log
            make_*.log
            ccache_*.log
            searchbench-tests.log
            searchbench-tests.xml
            sanitizers/
          if-no-files-found: ignore
          retention-days: 30
