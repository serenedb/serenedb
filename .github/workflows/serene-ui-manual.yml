name: SereneUI-Build-Manual

on:
    workflow_dispatch:
        inputs:
            VERSION:
                description: "Version string, e.g. 26.01.1 (used as Docker tag and for GitHub Release)"
                required: true
                type: string
            RUN_TESTS:
                description: "Run SereneUI screenshot tests"
                required: true
                type: boolean
                default: true
            BUILD_IMAGE:
                description: "Build SereneUI Docker image"
                required: true
                type: boolean
                default: false
            PUSH_IMAGE_TO_REGISTRY:
                description: "Push SereneUI Docker image to Docker Registry"
                required: true
                type: boolean
                default: false
            EXTRA_DOCKER_TAGS:
                description: "Additional Docker image tags, space- or comma-separated (optional)"
                required: false
                type: string
                default: ""
            BUILD_LINUX_APP:
                description: "Build SereneUI Linux desktop app"
                required: true
                type: boolean
                default: false
            BUILD_WINDOWS_APP:
                description: "Build SereneUI Windows desktop app"
                required: true
                type: boolean
                default: false
            BUILD_MACOS_APP:
                description: "Build SereneUI macOS desktop app"
                required: true
                type: boolean
                default: false
            PUSH_RELEASE:
                description: "Publish desktop app builds as GitHub Release"
                required: true
                type: boolean
                default: false

jobs:
    build:
        uses: ./.github/workflows/serene-ui-reusable.yml
        permissions:
            contents: write
        with:
            VERSION: ${{ inputs.VERSION }}
            RUN_TESTS: ${{ inputs.RUN_TESTS }}
            BUILD_IMAGE: ${{ inputs.BUILD_IMAGE }}
            PUSH_IMAGE_TO_REGISTRY: ${{ inputs.PUSH_IMAGE_TO_REGISTRY }}
            EXTRA_DOCKER_TAGS: ${{ inputs.EXTRA_DOCKER_TAGS }}
            BUILD_LINUX_APP: ${{ inputs.BUILD_LINUX_APP }}
            BUILD_WINDOWS_APP: ${{ inputs.BUILD_WINDOWS_APP }}
            BUILD_MACOS_APP: ${{ inputs.BUILD_MACOS_APP }}
            PUSH_RELEASE: ${{ inputs.PUSH_RELEASE }}
        secrets:
            PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
            TG_TOKEN: ${{ secrets.TG_TOKEN }}
            TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
            APPLE_ID: ${{ secrets.APPLE_ID }}
            APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
            APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
