name: task | validate pg tests

on:
  workflow_dispatch:
    inputs:
      LOCATION:
        description: "Runner label"
        type: string
        required: false
        default: "linux-amd64"
      PR_SHA:
        description: "Commit SHA to checkout (empty = workflow ref)"
        type: string
        required: false
        default: ""
      PG_TESTS:
        description: "Newline list of changed pg tests (relative to tests/sqllogic/); empty = run all"
        type: string
        required: false
        default: ""
  workflow_call:
    inputs:
      LOCATION:
        description: "Runner label"
        type: string
        required: false
        default: "linux-amd64"
      PR_SHA:
        description: "Commit SHA to checkout (fork PR support; empty = workflow ref)"
        type: string
        required: false
        default: ""
      PG_TESTS:
        description: "Newline list of changed pg tests (relative to tests/sqllogic/); empty = run all"
        type: string
        required: false
        default: ""

env:
  WORKSPACE: ${{ github.workspace }}
  BUILD_IMAGE: serenedb/serenedb-build-ubuntu:latest
  CARGO_TARGET_CACHE: /mnt/data/.cargo-target-sqllogic
  CARGO_HOME_CACHE: /mnt/data/.cargo-home-sqllogic

jobs:
  validate:
    name: "validate-pg-tests"
    runs-on:
      - ${{ inputs.LOCATION }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.PR_SHA || github.sha }}
          fetch-depth: 1
          submodules: false
          clean: true

      - name: Checkout test submodules
        run: git submodule update --init --depth=1 third_party/sqllogictest-rs

      - name: Prepare
        run: |
          mkdir -p out/logs
          mkdir -p "${HOME}/.cache/serenedb-cargo-target"
          for i in 1 2 3; do
            docker pull "${BUILD_IMAGE}" && break
            echo "Pull attempt $i failed, retrying in 10s..."
            sleep 10
          done

      - name: Run PG validation tests
        run: |
          export DOCKER_UID="$(id -u)"
          export DOCKER_GID="$(id -g)"
          export SQLLOGIC_DIR="${WORKSPACE}/tests/sqllogic"
          export PG_CHANGED_TESTS="${{ inputs.PG_TESTS }}"

          cd tests/sqllogic
          PREFIX="$(LC_ALL=C tr -dc 'a-z0-9' </dev/urandom 2>/dev/null | head -c 4)"

          cleanup() {
            docker compose -p "${PREFIX}" -f docker-compose.validate-pg-tests.yml down --volumes --remove-orphans
          }
          trap cleanup EXIT INT TERM

          docker compose \
            -p "${PREFIX}" \
            -f docker-compose.validate-pg-tests.yml \
            up \
            --attach tests \
            --exit-code-from tests \
            --remove-orphans

      - name: Upload test results
        if: always() && !cancelled()
        uses: actions/upload-artifact@v7
        with:
          name: validate-pg-results-${{ inputs.LOCATION }}-${{ github.run_number }}
          path: |
            out/logs/*
            **/tests/sqllogic/*.xml
          if-no-files-found: ignore
          retention-days: 30
