# See https://pre-commit.com for more information

# General excludes, files can also be excluded on a hook level
exclude: resources/.*|third_party/.*/.*|LICENSE
default_install_hook_types: [pre-commit, pre-push]
repos:
  - repo: meta
    hooks:
      # TODO(mbkkt) - id: check-hooks-apply
      - id: check-useless-excludes

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-ast
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-json
      - id: check-shebang-scripts-are-executable
      - id: check-merge-conflict
      # TODO(mbkkt) - id: pretty-format-json
      - id: check-symlinks
      - id: check-toml
      - id: check-vcs-permalinks
      - id: check-xml
      - id: check-yaml
      - id: destroyed-symlinks
      # TODO(mbkkt) - id: detect-aws-credentials
      # TODO(mbkkt) - id: detect-private-key
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: trailing-whitespace
        exclude: \.test$

  - repo: https://github.com/BlankSpruce/gersemi
    rev: 0.26.1
    hooks:
      - id: gersemi
        name: CMake formatter

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v21.1.8
    hooks:
      - id: clang-format
        files: \.(cpp|cc|c|hpp|hh|h|ipp|tpp)$

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.0-1
    hooks:
      - id: shfmt

  - repo: local
    hooks:
      - id: check-disclaimer
        name: Check disclaimer header
        language: python
        entry: python3 scripts/check_disclaimer.py
        files: \.(cpp|cc|c|hpp|hh|h|ipp|tpp)$
      - id: check-namespace-format
        name: Check namespace formatting
        language: python
        entry: python3 scripts/check_namespace_format.py
        files: \.(cpp|cc|c|hpp|hh|h|ipp|tpp)$
      - id: check-llm-symbols
        name: Check LLM Unicode symbols
        language: python
        entry: python3 scripts/check_llm_symbols.py
        files: \.(cpp|cc|c|hpp|hh|h|ipp|tpp|py|sh|bash|cmake|md|txt|yml|yaml)$
      - id: check-no-anon-namespace-in-headers
        name: Check no anonymous namespace in headers
        language: python
        entry: python3 scripts/check_no_anon_namespace_in_headers.py
        files: \.(hpp|hh|h)$
      - id: check-fault-points
        name: Check fault-injection points (tests <-> source)
        language: python
        entry: python3 scripts/check_fault_points.py
        # Cross-references the whole tree (a source change must be validated
        # against all tests and vice versa), so the script scans the trees
        # itself instead of the staged files -- but only when a file that can
        # affect the result changed.
        files: \.(test|test_slow|cpp|cc|c|hpp|hh|h|ipp|tpp)$
        pass_filenames: false
      - id: check-substitution-directive
        name: Check sqllogic substitution directive
        language: python
        entry: python3 scripts/check_substitution_directive.py
        files: ^tests/sqllogic/.*\.test
      - id: check-snake-case-filenames
        name: Check C++ filenames are snake_case
        language: python
        entry: python3 scripts/check_snake_case_filenames.py
        files: \.(cpp|cc|c|hpp|hh|h|ipp|tpp)$
      - id: check-cpp-extensions
        name: Check C++ file extensions (.hpp/.tpp/.cpp)
        language: python
        entry: python3 scripts/check_cpp_extensions.py
        files: \.(cpp|cc|c|hpp|hh|h|ipp|tpp|c\+\+|h\+\+)$
        exclude: ^tests/drivers/c/
      - id: check-api-keys
        name: Scan for hard-coded API keys
        language: python
        entry: python3 scripts/check_api_keys.py
        exclude_types: [binary]
