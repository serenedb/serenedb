{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "serenedb.fullname" . }}
  labels:
    {{- include "serenedb.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "serenedb.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: {{ .Values.listeners.postgres.port }}
        {{- if .Values.listeners.http.enabled }}
        - port: {{ .Values.listeners.http.port }}
        {{- end }}
{{- end }}
