{{- if not .Values.auth.existingSecret }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace (include "serenedb.fullname" .) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "serenedb.fullname" . }}
  labels:
    {{- include "serenedb.labels" . | nindent 4 }}
  annotations:
    # Keep the Secret on uninstall: the data PVC survives uninstall too, and
    # the datadir only honors the password from its first boot -- a reinstall
    # must find the same password, not generate a fresh one.
    helm.sh/resource-policy: keep
type: Opaque
data:
  {{- if .Values.auth.password }}
  postgres-password: {{ .Values.auth.password | b64enc | quote }}
  {{- else if and $existing (index $existing.data "postgres-password") }}
  # Keep the previously generated password stable across upgrades.
  postgres-password: {{ index $existing.data "postgres-password" | quote }}
  {{- else }}
  postgres-password: {{ randAlphaNum 24 | b64enc | quote }}
  {{- end }}
{{- end }}
