apiVersion: v1
kind: Pod
metadata:
  name: {{ include "serenedb.fullname" . }}-test-connection
  labels:
    {{- include "serenedb.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  automountServiceAccountToken: false
  containers:
    - name: psql
      # The server image ships psql; no extra image needed.
      image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
      imagePullPolicy: {{ .Values.image.pullPolicy }}
      {{- with .Values.containerSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      env:
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "serenedb.secretName" . }}
              key: postgres-password
      command:
        - psql
        - -h
        - {{ include "serenedb.fullname" . }}
        - -p
        - {{ .Values.listeners.postgres.port | quote }}
        - -U
        - postgres
        - -d
        - postgres
        - -c
        - SELECT 1
