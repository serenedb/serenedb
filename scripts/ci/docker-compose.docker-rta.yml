services:
  # Make the root:root 0755 named volume world-writable before the non-root
  # services use /test-tmp (the release image's serenedb user can't create dirs
  # in a fresh root-owned volume).
  test-tmp-init:
    image: ${BUILD_IMAGE}
    user: "0:0"
    volumes:
      - "sdb-test-tmp:/test-tmp"
    command: ["sh", "-c", "chmod 0777 /test-tmp"]

  serenedb:
    image: ${DOCKER_TEST_IMAGE}
    depends_on:
      test-tmp-init:
        condition: service_completed_successfully
    command: serened --auth_timeout=600s
    environment:
      - POSTGRES_PASSWORD=postgres
    volumes:
      - "sdb-test-tmp:/test-tmp"
    networks:
      - rta-network

  # HBA network tests: the mask test launches its OWN serened and connects from
  # different 127.x source addresses, so client and server must share a
  # container -- it cannot use the networked `serenedb` service. Runs the
  # release image's /usr/bin/serened; root because the image lacks python3.
  network-tests:
    image: ${DOCKER_TEST_IMAGE}
    user: "0:0"
    volumes:
      - "${WORKSPACE}:/workspace:ro"
    command: >
      sh -c '
        apt-get update -qq &&
        apt-get install -y -qq --no-install-recommends python3 &&
        SERENED=/usr/bin/serened /workspace/tests/network/run.sh
      '

  tests:
    image: ${BUILD_IMAGE}
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    depends_on:
      - serenedb
    volumes:
      - "${WORKSPACE}/tests/sqllogic:/sqllogic"
      - "${WORKSPACE}/third_party/sqllogictest-rs:/sqllogictest-rs"
      - "${WORKSPACE}/out/logs:/logs"
      - "sdb-test-tmp:/test-tmp"
      - "${CARGO_TARGET_CACHE:-${HOME}/.cache/serenedb-cargo-target}:/cargo-target"
      - "${CARGO_HOME_CACHE:-${HOME}/.cache/serenedb-cargo-home}:/cargo-home"
    environment:
      - HOME=/sqllogic
      - TMPDIR=/test-tmp
      - SLT_TEST_DIR_SHARED=1
      - CARGO_HOME=/cargo-home
      - CARGO_TARGET_DIR=/cargo-target
    networks:
      - rta-network
    command: >
      sh -c '
        echo "Waiting for serened to accept connections..." &&
        for i in $(seq 1 60); do
          pg_isready -h serenedb -p 7890 -U postgres -q 2>/dev/null && break
          sleep 1
        done &&
        pg_isready -h serenedb -p 7890 -U postgres &&

        cd /sqllogic &&
        exec env SDB_SQLLOGIC_SCOPE=ours ./run_sdb_tests.sh \
          --host serenedb \
          --single-port 7890 \
          --fast \
          --skip "encrypted|text_tokenizer|log_level|pg_typeof" \
          --runner=/sqllogictest-rs \
          --junit /logs/docker-rta-tests
      '

networks:
  rta-network:
    driver: bridge
    name: ${COMPOSE_PROJECT_NAME}_rta-network

volumes:
  sdb-test-tmp:
