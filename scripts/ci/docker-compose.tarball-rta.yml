services:
  # Make the root:root 0755 named volume world-writable before the non-root
  # services create their per-test dirs in /test-tmp.
  test-tmp-init:
    image: ${BUILD_IMAGE}
    user: "0:0"
    volumes:
      - "sdb-test-tmp:/test-tmp"
    command: ["sh", "-c", "chmod 0777 /test-tmp"]

  serenedb:
    image: ${BUILD_IMAGE}
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    depends_on:
      test-tmp-init:
        condition: service_completed_successfully
    tmpfs:
      - /var/lib/serenedb
      - /var/log/serenedb
    volumes:
      - "${WORKSPACE}:/workspace:ro"
      - "${WORKSPACE}/out/logs:/logs"
      - "sdb-test-tmp:/test-tmp"
    environment:
      - HOME=/tmp
      - TARBALL_NAME
    networks:
      - rta-network
    command: >
      sh -c '
        mkdir -p /tmp/serenedb &&
        tar -xzf /workspace/$TARBALL_NAME -C /tmp/serenedb --strip-components=1 &&
        exec /tmp/serenedb/usr/bin/serened \
          --flagfile=/tmp/serenedb/etc/serenedb/serened.conf \
          --listen postgres://0.0.0.0:7890 \
          --auth_timeout=600s \
      '

  # HBA network tests: the mask test launches its OWN serened (from its own
  # tarball extraction) and connects from different 127.x source addresses, so
  # client and server must share a container.
  network-tests:
    image: ${BUILD_IMAGE}
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    volumes:
      - "${WORKSPACE}:/workspace:ro"
    environment:
      - HOME=/tmp
      - TARBALL_NAME
    command: >
      sh -c '
        mkdir -p /tmp/serenedb &&
        tar -xzf /workspace/$TARBALL_NAME -C /tmp/serenedb --strip-components=1 &&
        SERENED=/tmp/serenedb/usr/bin/serened /workspace/tests/network/run.sh
      '

  tests:
    image: ${BUILD_IMAGE}
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    depends_on:
      - serenedb
    volumes:
      - "${WORKSPACE}/tests/sqllogic:/sqllogic"
      - "${WORKSPACE}/third_party/sqllogictest-rs:/sqllogictest-rs"
      - "${WORKSPACE}/out/logs:/logs"
      - "sdb-test-tmp:/test-tmp"
      - "${CARGO_TARGET_CACHE:-${HOME}/.cache/serenedb-cargo-target}:/cargo-target"
      - "${CARGO_HOME_CACHE:-${HOME}/.cache/serenedb-cargo-home}:/cargo-home"
    environment:
      - HOME=/sqllogic
      - TMPDIR=/test-tmp
      - SLT_TEST_DIR_SHARED=1
      - CARGO_HOME=/cargo-home
      - CARGO_TARGET_DIR=/cargo-target
    networks:
      - rta-network
    command: >
      sh -c '
        echo "Waiting for serened to accept connections..." &&
        for i in $(seq 1 60); do
          pg_isready -h serenedb -p 7890 -U postgres -q 2>/dev/null && break
          sleep 1
        done &&
        pg_isready -h serenedb -p 7890 -U postgres &&

        cd /sqllogic &&
        exec env SDB_SQLLOGIC_SCOPE=ours ./run_sdb_tests.sh \
          --host serenedb \
          --single-port 7890 \
          --fast \
          --skip "encrypted|text_tokenizer|log_level" \
          --runner=/sqllogictest-rs \
          --junit /logs/tarball-rta-tests
      '

networks:
  rta-network:
    driver: bridge
    name: ${COMPOSE_PROJECT_NAME}_rta-network

volumes:
  sdb-test-tmp:
