services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 1s
      timeout: 3s
      retries: 60
    ports:
      - "${CLICKHOUSE_HOST_PORT:-9000}:9000"
    # CLICKHOUSE_SKIP_USER_SETUP opens the `default` user to all networks with no
    # password (the 24.8 image otherwise locks it to localhost and rejects
    # serened's host-side connection over the published port). Env-var auth,
    # analogous to postgres's POSTGRES_HOST_AUTH_METHOD=trust -- no config mount.
    environment:
      CLICKHOUSE_SKIP_USER_SETUP: "1"
    # The image runs /docker-entrypoint-initdb.d/*.sql at startup, so the read
    # fixtures are pre-seeded here. The connector is read+write: write tests
    # create/drop their own tables at runtime.
    volumes:
      - "./fixtures:/docker-entrypoint-initdb.d:ro"
