services:
  postgres:
    image: postgres:18.3
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_DB: postgres
      # C.UTF-8 for bytewise collation; mirrors tests/postgres_scanner/docker-compose.yml.
      # See that file / the postgres_scanner README for why (attach_like.test).
      POSTGRES_INITDB_ARGS: "--locale=C.UTF-8"
      LANG: C.UTF-8
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 1s
      timeout: 3s
      retries: 30
    networks:
      - test-network

  tests:
    image: ${BUILD_IMAGE}
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    volumes:
      - "${WORKSPACE}:/serenedb"
      - "${WORKSPACE}/logs:/logs"
    env_file:
      - "${WORKSPACE}/docker.env"
    environment:
      - BUILD_DIR
      - HOME=/serenedb
      - LOG_DIR=/logs
      - REPORTS_DIR=/serenedb/tests/sqllogic
      - PGHOST=postgres
      - PGPORT=5432
      - PGUSER=postgres
      - PGDATABASE=postgres
    networks:
      - test-network
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c '
        cd /serenedb &&
        exec ./tests/postgres_scanner/run.sh --use-existing
      '

networks:
  test-network:
    driver: bridge
    name: ${COMPOSE_PROJECT_NAME}_test-network
