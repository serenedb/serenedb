services:
  # Fresh named volumes are created root:root 0755, so the non-root (user-mapped)
  # services below cannot create their per-test dirs in /test-tmp. This one-shot
  # root service makes the shared scratch world-writable before they start.
  test-tmp-init:
    image: ${BUILD_IMAGE}
    user: "0:0"
    volumes:
      - "sdb-test-tmp:/test-tmp"
    command: ["sh", "-c", "chmod 0777 /test-tmp"]

  serenedb-single:
    image: ${BUILD_IMAGE}
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    depends_on:
      test-tmp-init:
        condition: service_completed_successfully
    security_opt:
      - seccomp:unconfined
    volumes:
      - "${WORKSPACE}:/serenedb"
      - "${WORKSPACE}/out/logs:/var/log/serenedb"
      - "sdb-test-tmp:/test-tmp"
    env_file:
      - "${WORKSPACE}/docker.env"
    environment:
      - BUILD_DIR
      - HOME=/serenedb
      - POSTGRES_PASSWORD=postgres
    networks:
      - test-network
    command: >
      sh -c '
        exec /serenedb/${BUILD_DIR}/bin/serened /tmp/serenedb_datadir \
          --listen "postgres://0.0.0.0:7777,postgres://0.0.0.0:7778?sslmode=require&cert=/serenedb/resources/ca.pem&key=/serenedb/resources/ca.pem"
      '

  tests:
    image: ${BUILD_IMAGE}
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    group_add:
      - "${DOCKER_SOCK_GID:-999}"
    volumes:
      - "${SQLLOGIC_DIR}:/sqllogic"
      - "${WORKSPACE}/third_party/sqllogictest-rs:/sqllogictest-rs"
      - "${WORKSPACE}/out/logs:/logs"
      - "${CARGO_TARGET_CACHE:-${HOME}/.cache/serenedb-cargo-target}:/cargo-target"
      - "${CARGO_HOME_CACHE:-${HOME}/.cache/serenedb-cargo-home}:/cargo-home"
      - "${SDB_TIMING_CACHE:-${HOME}/.cache/serenedb-timing-cache}:/timing-cache"
      - "sdb-test-tmp:/test-tmp"
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - serenedb-single
    environment:
      - COMPOSE_NETWORK=${COMPOSE_PROJECT_NAME}_test-network
      - LOG_DIR=/logs
      - RESOURCES
      - HOME=/sqllogic
      - TMPDIR=/test-tmp
      - SLT_TEST_DIR_SHARED=1
      - CARGO_HOME=/cargo-home
      - CARGO_TARGET_DIR=/cargo-target
      - SDB_TIMING_CACHE_DIR=/timing-cache
      - SDB_TIMING_KEY
      - SKIP_SLOW_TESTS
      - SDB_SQLLOGIC_SCOPE
    networks:
      - test-network
    command: >
      sh -c '
        cd /sqllogic &&
        exec ./run_sdb_tests.sh \
          --host serenedb-single \
          --single-port 7777 \
          --single-port-ssl 7778 \
          --runner=/sqllogictest-rs
      '

networks:
  test-network:
    driver: bridge
    name: ${COMPOSE_PROJECT_NAME}_test-network

volumes:
  sdb-test-tmp:
