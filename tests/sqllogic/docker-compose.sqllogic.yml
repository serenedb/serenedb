services:
  postgres:
    image: postgres:18-alpine
    security_opt:
      - seccomp:unconfined
    environment:
      - POSTGRES_HOST_AUTH_METHOD=trust
      - POSTGRES_USER=postgres
      - POSTGRES_DB=postgres
    volumes:
      - type: tmpfs
        target: /var/lib/postgresql
        tmpfs:
          size: 16G
    networks:
      - test-network
    command: ["postgres", "-c", "max_connections=900"]

  serenedb-single:
    image: "$BUILD_IMAGE"
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    security_opt:
      - seccomp:unconfined
    volumes:
      - "$WORKSPACE:/serenedb"
      - "$WORKSPACE/logs:/var/log/serenedb"
    env_file:
      - "$WORKSPACE/docker.env"
    environment:
      - BUILD_DIR
      - HOME=/serenedb
    networks:
      - test-network
    command: >
        sh -c '
          exec /serenedb/${BUILD_DIR}/bin/serened /tmp/serenedb_datadir \
            --server.endpoint pgsql+tcp://0.0.0.0:7777 \
            --server.endpoint pgsql+ssl://0.0.0.0:7778 \
            --ssl.keyfile /serenedb/resources/ca.pem \
            --server.endpoint tcp://0.0.0.0:8529 \
            --server.authentication 0
        '

  tests:
    image: ${BUILD_IMAGE}
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    group_add:
      - "${DOCKER_SOCK_GID:-999}"
    volumes:
      - "$SQLLOGIC_DIR:/sqllogic"
      - "$WORKSPACE/third_party/sqllogictest-rs:/sqllogictest-rs"
      - "$WORKSPACE/logs:/logs"
      - "${CARGO_TARGET_CACHE:-${HOME}/.cache/serenedb-cargo-target}:/cargo-target"
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - postgres
      - serenedb-single
    environment:
      - COMPOSE_NETWORK=${COMPOSE_PROJECT_NAME}_test-network
      - LOG_DIR=/logs
      - RESOURCES
      - HOME=/sqllogic
      - CARGO_HOME=/tmp/cargo
      - CARGO_TARGET_DIR=/cargo-target
    networks:
      - test-network
    command: sqllogic/run_serene_and_pg.sh

networks:
  test-network:
    driver: bridge
    name: ${COMPOSE_PROJECT_NAME}_test-network
