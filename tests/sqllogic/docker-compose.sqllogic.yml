services:
  serenedb-single:
    image: "$BUILD_IMAGE"
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    security_opt:
      - seccomp:unconfined
    volumes:
      - "$WORKSPACE:/serenedb"
      - "$WORKSPACE/logs:/var/log/serenedb"
    env_file:
      - "$WORKSPACE/docker.env"
    environment:
      - BUILD_DIR
      - HOME=/serenedb
    networks:
      - test-network
    command: >
        sh -c '
          exec /serenedb/${BUILD_DIR}/bin/serened /tmp/serenedb_datadir \
            --server.endpoint pgsql+tcp://0.0.0.0:7777 \
            --server.endpoint pgsql+ssl://0.0.0.0:7778 \
            --ssl.keyfile /serenedb/resources/ca.pem \
            --server.endpoint tcp://0.0.0.0:8529 \
            --server.authentication 0
        '

  tests:
    image: ${BUILD_IMAGE}
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    group_add:
      - "${DOCKER_SOCK_GID:-999}"
    volumes:
      - "$SQLLOGIC_DIR:/sqllogic"
      - "$WORKSPACE/third_party/sqllogictest-rs:/sqllogictest-rs"
      - "$WORKSPACE/logs:/logs"
      - "${CARGO_TARGET_CACHE:-${HOME}/.cache/serenedb-cargo-target}:/cargo-target"
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - serenedb-single
    environment:
      - COMPOSE_NETWORK=${COMPOSE_PROJECT_NAME}_test-network
      - LOG_DIR=/logs
      - RESOURCES
      - HOME=/sqllogic
      - CARGO_HOME=/tmp/cargo
      - CARGO_TARGET_DIR=/cargo-target
      - SKIP_SLOW_TESTS
    networks:
      - test-network
    command: >
      sh -c '
        cd /sqllogic &&
        exec ./run_sdb_tests.sh \
          --host serenedb-single \
          --single-port 7777 \
          --single-port-ssl 7778 \
          --runner=/sqllogictest-rs
      '

networks:
  test-network:
    driver: bridge
    name: ${COMPOSE_PROJECT_NAME}_test-network
